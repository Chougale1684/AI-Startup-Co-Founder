{% extends "base.html" %}
{% block content %}

<nav class="top-nav">
  <div class="nav-left">
    <h1 class="app-logo">CoFoundr</h1>
  </div>

  <div class="nav-right">
    <div class="profile-container">
      <!-- Circular Avatar -->
      <div class="profile-avatar" onclick="toggleDropdown()" title="Account">
        <span id="avatar-initials">{{ current_user.username[:2].upper() }}</span>
      </div>

      <!-- Dropdown Menu -->
      <div id="profile-dropdown" class="dropdown-menu">
        <a href="#" class="dropdown-item">
          👤 Edit Profile
        </a>
        <a href="#" class="dropdown-item">
          ⚙️ Settings
        </a>
        <a href="{{ url_for('logout') }}" class="dropdown-item logout">
          🚪 Logout
        </a>
      </div>
    </div>
  </div>
</nav>
<div class="main-content">
  <div class="hero">
    <h1>CoFoundr</h1>
    <p class="tagline">Your AI Startup Partner</p>
  </div>

  <div class="idea-card">
    <h3>Your Startup Idea</h3>
    <textarea id="idea" rows="7" placeholder="Describe your startup idea in detail..."></textarea>
    <div class="tip">💡 The more detailed your idea, the better the AI feedback</div>
  </div>

  <div class="action-buttons">
    <button onclick="validateIdea()" class="btn validate-btn">✅ Validate Idea</button>
    <button onclick="marketResearch()" class="btn research-btn">🔍 Market Research</button>
    <button onclick="generatePitch()" class="btn pitch-btn">🎤 Generate Pitch</button>
  </div>

  <div id="loading" class="loading hidden">
    <span class="spinner"></span> Analyzing with AI...
  </div>

  <div id="results" class="results hidden">
    <div class="result-card">
      <h2 id="result-title"></h2>
      <div id="result-content" class="content"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
